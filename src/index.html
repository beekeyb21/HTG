<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTG Monitoring — Hệ thống giám sát phóng xạ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-title">
      <h1>HTG — Hệ thống giám sát phóng xạ</h1>
      <span class="subtitle">Giám sát 3 vùng theo thời gian thực</span>
    </div>
    <div class="env-readout" id="env-readout">
      <span id="env-temp">-- °C</span>
      <span id="env-humidity">-- %RH</span>
      <span id="env-pressure">-- hPa</span>
    </div>
  </header>

  <main class="zones" id="zones">
    <!-- 3 zone cards are rendered here by app.js -->
  </main>

  <section class="alert-log">
    <h2>Nhật ký cảnh báo</h2>
    <div class="log-list" id="log-list">
      <p class="log-empty">Chưa có cảnh báo nào.</p>
    </div>
  </section>

  <footer class="footer">
    <span>Dữ liệu hiện đang mô phỏng (mock-data.js). Thay bằng API/WebSocket thật khi tích hợp phần cứng.</span>
  </footer>

  <script src="js/mock-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
